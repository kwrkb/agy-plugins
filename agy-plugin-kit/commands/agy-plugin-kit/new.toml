description = "正しい構造の agy プラグイン雛形を生成する（マニフェスト形式の自動選択・Windows 対応・検証込み）"
prompt = """
新しい agy プラグインの雛形を生成します。引数: {{args}}（プラグイン名。必要なら種別も）。

まず skill `agy-plugin-authoring` の規則を読み込み、それに完全準拠した雛形を作ること。

手順:
1. ユーザーに種別を確認（未確定なら）:
   - **A. PATH コマンド型**（既存 CLI を起動。例 `glab mcp serve`）→ native `plugin.json` + `mcp_config.json`。
   - **B. バイナリ同梱型**（自作 MCP サーバー/ラッパーを同梱）→ `gemini-extension.json` 形式
     （`command` は `${extensionPath}${/}bin${/}<name>`）。ソースは `<name>/src/`、配布物は `<name>/bin/` に分離し、
     `bin/` に `<name>-linux-amd64` / `<name>-darwin-arm64` / `<name>.exe`（ネイティブ）＋拡張子なしの
     OS 分岐 dispatcher `bin/<name>`（shebang sh・`uname` で `exec`、+x コミット）を置く。Windows は `.exe` 直起動。
     `plugin.json` は置かない。再ビルドはルートの `./build.sh <name>`（`./build.ps1`）。
   - **C. コマンド/スキル中心**（MCP 無し）→ native `plugin.json` のみ。
2. `~/.gemini/config/plugins/agy-plugin-kit/templates/` の該当テンプレートを複製し、プレースホルダ
   （`{{NAME}}` `{{DESC}}` 等）を埋める。生成先はカレントリポジトリ直下の `<name>/`。
   - **プラグイン名は識別子安全に検証**する（英数・ハイフンのみ。空白や記号は不可）。Go ラッパー雛形の
     `module`/識別子に使う値も同様。
   - JSON（plugin.json/mcp_config.json）に埋める値は **ダブルクォート・バックスラッシュを必ずエスケープ**し、
     Go ソース（wrapper.go.tmpl）の文字列リテラルに埋める値も**エスケープ済みであることを確認**する
     （未エスケープだと不正な JSON / コンパイルエラー / ソース注入になる）。複数引数を持つコマンドは
     `strings.Fields` 分割では不十分なので、必要なら生成後に Go スライスリテラルへ手修正する。
3. 種別 B で同梱バイナリを作る場合は **必ず `.gitignore` を確認**し、`bin/` 配下のネイティブと dispatcher が
   コミット対象になるようにする（C4 回避）。dispatcher は +x コミット。MCP サーバー/ラッパーは stdout に書かない（C9）。
4. 生成後に `~/.gemini/config/plugins/agy-plugin-kit/validator/bin/validator <生成先>` を実行し、
   **0 エラー**であることを確認してからユーザーに引き渡す（自分が吐いた雛形が自分のルールに適合することを保証）。
5. 最後に `agy plugin install <生成先>` でのインストール手順を案内する。
"""
